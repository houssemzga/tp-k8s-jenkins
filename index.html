<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Clients</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        .content {
            padding: 30px;
        }
        .add-client {
            background: #f0f4f8;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .add-client input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .add-client input:focus {
            outline: none;
            border-color: #667eea;
        }
        .add-client button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }
        .add-client button:hover {
            transform: translateY(-2px);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
        }
        tr:hover {
            background: #f5f5f5;
        }
        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .delete-btn:hover {
            transform: scale(1.05);
            background: #ff3838;
        }
        .stats {
            margin-top: 20px;
            padding: 15px;
            background: #f0f4f8;
            border-radius: 10px;
            text-align: center;
        }
        .footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 0.9em;
        }
        @media (max-width: 768px) {
            th, td {
                padding: 10px;
                font-size: 14px;
            }
            .add-client {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Gestion des Clients</h1>
            <p>Application déployée sur Kubernetes 🚀</p>
        </div>
        <div class="content">
            <div class="add-client">
                <input type="text" id="nom" placeholder="Nom du client">
                <input type="text" id="email" placeholder="Email">
                <input type="text" id="telephone" placeholder="Téléphone">
                <button onclick="ajouterClient()">➕ Ajouter Client</button>
            </div>
            <table id="clientTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nom</th>
                        <th>Email</th>
                        <th>Téléphone</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="clientBody">
                    <tr>
                        <td colspan="5" style="text-align: center;">Chargement des clients...</td>
                    </tr>
                </tbody>
            </table>
            <div class="stats" id="stats">
                Total clients: 0
            </div>
        </div>
        <div class="footer">
            <p>TP CI/CD - Jenkins + Docker + Kubernetes | Déploiement automatique ✅</p>
        </div>
    </div>

    <script>
        // API URL (utilise l'URL de ton service Kubernetes)
        const API_URL = window.location.origin;

        // Charger les clients au démarrage
        async function chargerClients() {
            try {
                const response = await fetch('/api/clients');
                const clients = await response.json();
                afficherTableau(clients);
                updateStats(clients.length);
            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('clientBody').innerHTML = '<tr><td colspan="5" style="text-align: center;">Erreur de connexion au serveur</td></tr>';
            }
        }

        // Afficher le tableau
        function afficherTableau(clients) {
            const tbody = document.getElementById('clientBody');
            if (clients.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">Aucun client. Ajoutez-en un !</td></tr>';
                return;
            }
            
            tbody.innerHTML = clients.map(client => `
                <tr>
                    <td>${client.id}</td>
                    <td>${escapeHtml(client.nom)}</td>
                    <td>${escapeHtml(client.email)}</td>
                    <td>${escapeHtml(client.telephone)}</td>
                    <td><button class="delete-btn" onclick="supprimerClient(${client.id})">🗑 Supprimer</button></td>
                </tr>
            `).join('');
        }

        // Ajouter un client
        async function ajouterClient() {
            const nom = document.getElementById('nom').value;
            const email = document.getElementById('email').value;
            const telephone = document.getElementById('telephone').value;

            if (!nom || !email || !telephone) {
                alert('Veuillez remplir tous les champs');
                return;
            }

            const client = { nom, email, telephone };

            try {
                const response = await fetch('/api/clients', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(client)
                });
                
                if (response.ok) {
                    // Vider les champs
                    document.getElementById('nom').value = '';
                    document.getElementById('email').value = '';
                    document.getElementById('telephone').value = '';
                    // Recharger la liste
                    chargerClients();
                }
            } catch (error) {
                console.error('Erreur:', error);
                alert('Erreur lors de l\'ajout');
            }
        }

        // Supprimer un client
        async function supprimerClient(id) {
            if (confirm('Supprimer ce client ?')) {
                try {
                    await fetch(`/api/clients/${id}`, { method: 'DELETE' });
                    chargerClients();
                } catch (error) {
                    console.error('Erreur:', error);
                    alert('Erreur lors de la suppression');
                }
            }
        }

        // Mettre à jour les statistiques
        function updateStats(total) {
            document.getElementById('stats').innerHTML = `
                📊 Total clients: ${total} | 💾 Données stockées en mémoire
            `;
        }

        // Protection XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Charger au démarrage
        chargerClients();
    </script>
</body>
</html>
